<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Tanya Simkhovich</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Inria+Serif:ital,wght@1,400;1,700&display=block" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="cvs-case-study.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <!-- ─── Navigation ──────────────────────────────────────────────── -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-headshot">
        <img class="nav-avatar" src="assets/avatar.png" alt="Tanya Simkhovich" />
        <span class="nav-name">Tanya Simkhovich</span>
      </a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="index.html">HOME</a></li>
          <li><a href="work.html">WORK</a></li>
          <li><a href="about.html">ABOUT</a></li>
          <li><a href="resume.html">RESUME</a></li>
          <li><a href="contact.html" class="active">CONTACT</a></li>
        </ul>
        <button class="toggle-mode" id="toggleMode" aria-label="Toggle dark/light mode" data-mode="light">
          <span class="toggle-mode__bg"></span>
          <img class="toggle-mode__icon" src="assets/icon-moon.svg" alt="" />
        </button>
        <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
          <img src="assets/icon-hamburger.svg" alt="" />
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <div class="mobile-menu__panel">
      <div class="mobile-menu__header">
        <button class="mobile-close" id="mobileClose" aria-label="Close menu">
          <img src="assets/icon-close.svg" alt="" />
        </button>
      </div>
      <ul class="mobile-nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="work.html">Work</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>

  <main class="case-study">
    <div class="cs-inner">

      <!-- ─── Content ───────────────────────────────────────────── -->
      <div class="cs-content">

        <div class="contact-wrap anim-from-bottom">
          <h1 class="cs-title contact-title">Get in Touch</h1>
          <form class="contact-card" action="https://formspree.io/f/mykboyey" method="POST">
            <p class="contact-intro">I'm always open to discussing new projects, creative ideas, or opportunities.</p>

            <div class="contact-field">
              <label class="contact-label" for="contactName">Name:</label>
              <input class="contact-input" type="text" id="contactName" name="name" placeholder="Enter your name" required />
            </div>

            <div class="contact-field">
              <label class="contact-label" for="contactEmail">Email:</label>
              <input class="contact-input" type="email" id="contactEmail" name="email" placeholder="your@email.com" required />
            </div>

            <div class="contact-field">
              <label class="contact-label" for="contactMessage">Message:</label>
              <textarea class="contact-textarea" id="contactMessage" name="message" required></textarea>
            </div>

            <button class="contact-submit" type="submit">Send Message</button>
          </form>
        </div>

      </div><!-- /.cs-content -->

    </div><!-- /.cs-inner -->
  </main>

  <!-- ─── Footer ────────────────────────────────────────────────── -->
  <footer id="footer">
    <div class="footer-inner">
      <p class="footer-copy">&copy; All rights reserved 2026 Tanya Simkhovich.</p>
      <div class="footer-contact">
        <span class="footer-connect">Connect</span>
        <a class="footer-linkedin" href="https://linkedin.com/in/tanyasimkhovich/" target="_blank" rel="noopener">
          <img src="assets/linkedin-logo.png" alt="LinkedIn" />
        </a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
